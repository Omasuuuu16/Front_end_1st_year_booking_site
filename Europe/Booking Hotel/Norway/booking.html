<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hotel Booking</title>
  <style>
  .box-ss{
    background-color: #000000;
    color: aliceblue;
    font-size: 30px;
    font-family: "Dancing Script", cursive;
    border-bottom: 5px solid #fdfdfd ;
    padding: 10px;
    position: fixed;
    top:0;
    left: 0;
    right: 0;
    width: 99%;
    display: flex;
    z-index:9999;
  }
  .search-ss{
    flex: 1;
    text-align: right;
    border-radius: 10px;
  }
  .search-ss input {
    border-radius: 10px;
    padding: 2px 5px;
    border: none;
    outline: none;
    font-size: 16px;
  }
    nav{
        text-align: left;
        margin-left:40px;
        margin-top:9px;
        flex: 1;
    }
    button {
        background-color:rgb(255, 255, 255) ;
        text-decoration: none;
        padding: 5px 15px;
        color: black;
        border: 1px solid black;
        border-radius: 10px;
        transition: background-color 0.7s,
                    color 0.5s,
                    padding 1s;
    }
    button:hover{
        background-color: rgb(73, 73, 73);
        padding: 12px 12px;
    }
    a {
        color: #000000;
        text-decoration: none;
    }
    a:hover{
        color: #fbfcfc;
        text-decoration:none;
    }
  
  
  
  
  * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    
    .container {
      background-color: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      width: 300px;
      text-align: center;
    }
    
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    
    form {
      display: flex;
      flex-direction: column;
    }
    
    label {
      text-align: left;
      margin-bottom: 5px;
      color: #555;
    }
    
    input, select, button {
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    
    button {
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
      border: none;
      transition: background-color 0.3s;
    }
    
    button:hover {
      background-color: #45a049;
    }
    
    #confirmation-message {
      margin-top: 20px;
      color: #333;
    }
    #confirmation {
      display: none;
      background-color: #e6fff2;
      border: 2px solid #28a745;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      text-align: center;
      transform: scale(0.8);
      opacity: 0;
    }
    
    .show-confirmation {
      animation: fadeInScale 0.6s ease-out forwards;
    }
    
    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    #confirmation h3::before {
      content: "✔ ";
      color: green;
      font-size: 24px;
    }
    


  </style>
</head>
<body>
  <div class="container">
    <h1>Hotel Booking</h1>
    <form id="hotel-booking-form">
      <label for="name">Full Name:</label>
      <input type="text" id="name" placeholder="Enter your name" required/>

      <label for="check-in">Check-in Date:</label>
      <input type="date" id="check-in" required />

      <label for="check-out">Check-out Date:</label>
      <input type="date" id="check-out" required/>

      <label for="room-type">Room Type:</label>
      <select id="room-type" required>
        <option value="single">Single Room</option>
        <option value="double">Double Room</option>
        <option value="suite">Suite</option>  
      </select>
      <label for="room-view">Room View</label>
      <select id="room-view" required>
        <option value="sea">Sea View</option>
        <option value="city">City View</option>
        <option value="garden">Garden View</option>
        <option value="pool">Pool view</option>
      </select>

      <button type="submit">Book Now</button>
    </form>

    <div id="confirmation-message" style="display: none;">
      <h3>Booking Confirmed!</h3>
      <p>Name: <span id="customer-name"></span></p>
      <p>Check-in: <span id="customer-check-in"></span></p>
      <p>Check-out: <span id="customer-check-out"></span></p>
      <p>Room Type: <span id="customer-room-type"></span></p>
      <p>Room View: <span id="customer-room-view"></span></p>
    </div>
  </div>

  <script>
    document.getElementById('hotel-booking-form').addEventListener('submit', function (event) {
  event.preventDefault();

  // Get form values
  const name = document.getElementById('name').value;
  const checkIn = document.getElementById('check-in').value;
  const checkOut = document.getElementById('check-out').value;
  const roomType = document.getElementById('room-type').value;
  const roomView = document.getElementById('room-view').value;

  // Date validation
  const today = new Date().toISOString().split('T')[0];
  if (checkIn < today) {
    alert('Check-in date cannot be in the past.');
    return;
  }

  if (checkOut <= checkIn) {
    alert('Check-out date must be after check-in date.');
    return;
  }

  // Display confirmation
  document.getElementById('customer-name').textContent = name;
  document.getElementById('customer-check-in').textContent = checkIn;
  document.getElementById('customer-check-out').textContent = checkOut;
  document.getElementById('customer-room-type').textContent = roomType;
  document.getElementById('customer-room-view').textContent = roomView;

  document.getElementById('hotel-booking-form').style.display = 'none';
  document.getElementById('confirmation-message').style.display = 'block';
});

  </script>
</body>
</html>
